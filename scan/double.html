<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#1a1008"/>
<title>Double Shot — Espresso Club</title>
<script src="../config.js"></script>
<script src="../fingerprint.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0e0a05;
    --surface:  #1c1208;
    --card:     #231709;
    --border:   rgba(210,160,80,0.18);
    --gold:     #c8922a;
    --gold-lt:  #e8b84b;
    --cream:    #f0e6d0;
    --muted:    #8a7a60;
    --radius:   16px;
    --font:     'Georgia', serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--cream);
    font-family: var(--font);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 1.5rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem 1.75rem;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 0 60px rgba(200,146,42,0.08);
  }

  .cup { font-size: 56px; margin-bottom: 1.25rem; line-height: 1; }

  h1 {
    font-size: 1.5rem;
    font-weight: normal;
    letter-spacing: 0.04em;
    color: var(--gold-lt);
    margin-bottom: 0.35rem;
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1.75rem;
    letter-spacing: 0.02em;
  }

  /* States */
  .state { display: none; }
  .state.active { display: block; }

  /* Loading spinner */
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Name registration */
  .field-label {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: left;
    margin-bottom: 6px;
  }

  input[type="text"] {
    width: 100%;
    padding: 11px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--cream);
    font-family: var(--font);
    font-size: 1rem;
    margin-bottom: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--gold); }
  input[type="text"]::placeholder { color: var(--muted); }

  button {
    width: 100%;
    padding: 12px;
    background: var(--gold);
    color: #1a0e00;
    border: none;
    border-radius: 10px;
    font-family: var(--font);
    font-size: 1rem;
    font-weight: bold;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  button:hover { background: var(--gold-lt); }
  button:active { transform: scale(0.98); }

  /* Success tick */
  .tick-circle {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(100,190,120,0.15);
    border: 2px solid rgba(100,190,120,0.4);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.25rem;
    font-size: 30px;
  }

  .success-name {
    font-size: 1.2rem;
    color: var(--gold-lt);
    margin-bottom: 0.25rem;
  }

  .shot-badge {
    display: inline-block;
    padding: 4px 14px;
    background: rgba(200,146,42,0.15);
    border: 1px solid rgba(200,146,42,0.3);
    border-radius: 99px;
    font-size: 0.8rem;
    color: var(--gold-lt);
    margin-bottom: 1.5rem;
    letter-spacing: 0.04em;
  }

  .running-total {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 1.25rem;
  }

  .running-total strong { color: var(--cream); }

  /* Error */
  .error-msg {
    font-size: 0.85rem;
    color: #e07060;
    margin-top: 0.75rem;
  }

  .wordmark {
    margin-top: 2rem;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="card">
  <div class="cup">☕</div>
  <h1 id="card-title">Double Shot</h1>
  <p class="subtitle" id="card-sub">Espresso Club</p>

  <!-- Loading -->
  <div class="state active" id="state-loading">
    <div class="spinner"></div>
    <p style="color:var(--muted); font-size:0.85rem;">Identifying your device…</p>
  </div>

  <!-- First visit: register name -->
  <div class="state" id="state-register">
    <p style="font-size:0.9rem; color:var(--muted); margin-bottom:1.25rem; line-height:1.6;">
      First time here. What's your name?
    </p>
    <div class="field-label">Your name</div>
    <input type="text" id="name-input" placeholder="e.g. Alice" autocomplete="given-name" autocapitalize="words"/>
    <button onclick="registerAndLog()">Log my shot</button>
    <p class="error-msg" id="reg-error" style="display:none;"></p>
  </div>

  <!-- Success -->
  <div class="state" id="state-success">
    <div class="tick-circle">✓</div>
    <div class="success-name" id="success-name"></div>
    <div class="shot-badge" id="success-badge">1 × double shot</div>
    <p style="font-size:0.85rem; color:var(--muted); line-height:1.6;">Logged successfully.<br>See you tomorrow.</p>
    <div class="running-total" id="running-total"></div>
  </div>

  <!-- Error -->
  <div class="state" id="state-error">
    <p style="color:#e07060; font-size:0.9rem; line-height:1.6;" id="error-detail">
      Something went wrong. Please try again.
    </p>
    <button onclick="location.reload()" style="margin-top:1rem; background:var(--surface); color:var(--cream); border:1px solid var(--border);">Retry</button>
  </div>
</div>

<div class="wordmark">The Espresso Club</div>

<script>
const SHOT_TYPE = 'double';
let deviceId = null;

function showState(name) {
  document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
  document.getElementById('state-' + name).classList.add('active');
}

async function supabaseFetch(path, method, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': 'Bearer ' + SUPABASE_ANON,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : '',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  const text = await res.text();
  return { ok: res.ok, status: res.status, data: text ? JSON.parse(text) : null };
}

async function getMemberByDevice(devId) {
  const r = await supabaseFetch('members?device_id=eq.' + encodeURIComponent(devId) + '&select=id,name', 'GET');
  return (r.ok && r.data && r.data.length) ? r.data[0] : null;
}

async function getMonthlyShotCount(memberId) {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
  const r = await supabaseFetch(
    'shots?member_id=eq.' + memberId +
    '&logged_at=gte.' + start +
    '&select=id,shot_type', 'GET'
  );
  if (!r.ok || !r.data) return null;
  const singles = r.data.filter(s => s.shot_type === 'single').length;
  const doubles = r.data.filter(s => s.shot_type === 'double').length;
  return { singles, doubles };
}

async function logShot(memberId) {
  return supabaseFetch('shots', 'POST', {
    device_id: deviceId,
    member_id: memberId,
    shot_type: SHOT_TYPE,
  });
}

async function registerAndLog() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) {
    const err = document.getElementById('reg-error');
    err.textContent = 'Please enter your name.';
    err.style.display = 'block';
    return;
  }

  showState('loading');

  // Create member
  const r = await supabaseFetch('members', 'POST', {
    name,
    device_id: deviceId,
  });

  if (!r.ok || !r.data || !r.data[0]) {
    showError('Could not register. Try again.');
    return;
  }

  const member = r.data[0];
  const shotR = await logShot(member.id);

  if (!shotR.ok) {
    showError('Registered but shot log failed. Tell Paul.');
    return;
  }

  showSuccess(member.name, { singles: 0, doubles: 1 });
}

function showSuccess(name, counts) {
  document.getElementById('success-name').textContent = name;
  document.getElementById('success-badge').textContent = SHOT_TYPE === 'single' ? '1 × double shot' : '1 × double shot';

  const total = counts.singles + counts.doubles;
  if (total > 0) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const mo = months[new Date().getMonth()];
    document.getElementById('running-total').innerHTML =
      'Your ' + mo + ' tally: <strong>' + counts.singles + ' single' + (counts.singles !== 1 ? 's' : '') +
      ', ' + counts.doubles + ' double' + (counts.doubles !== 1 ? 's' : '') + '</strong>';
  }

  showState('success');
}

function showError(msg) {
  document.getElementById('error-detail').textContent = msg;
  showState('error');
}

async function init() {
  try {
    deviceId = await getDeviceId();
    const member = await getMemberByDevice(deviceId);

    if (!member) {
      showState('register');
      setTimeout(() => document.getElementById('name-input').focus(), 100);
      return;
    }

    const shotR = await logShot(member.id);
    if (!shotR.ok) { showError('Could not log shot. Try again.'); return; }

    const counts = await getMonthlyShotCount(member.id);
    showSuccess(member.name, counts || { singles: 0, doubles: 0 });

  } catch (e) {
    showError('Connection error: ' + e.message);
  }
}

init();
</script>
</body>
</html>
